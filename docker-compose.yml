services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: wikidb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d wikidb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://pguser:pass@postgres:5432/wikidb
      PG_DSN: "host=postgres port=5432 dbname=wikidb user=pguser password=pass"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata:
